version: '3.8'

services:
  ztupid-gen:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - ./server/generated:/app/generated
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/personalities"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Development services
  ztupid-gen-dev:
    build: .
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev
    profiles:
      - dev